<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robotspelet</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a1a">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    padding: 8px;
  }

  /* --- Player info bars --- */
  .player-info {
    width: 100%;
    text-align: center;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 1em;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: all 0.3s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .player-info .status {
    font-size: 0.8em;
    opacity: 0.7;
    font-weight: 400;
  }

  .player-info.top {
    transform: rotate(180deg);
    background: rgba(231, 76, 60, 0.15);
    border: 2px solid rgba(231, 76, 60, 0.2);
    color: #e74c3c;
  }

  .player-info.bottom {
    background: rgba(52, 152, 219, 0.15);
    border: 2px solid rgba(52, 152, 219, 0.2);
    color: #3498db;
  }

  .player-info.top.active {
    background: rgba(231, 76, 60, 0.35);
    border-color: #e74c3c;
    box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
  }

  .player-info.bottom.active {
    background: rgba(52, 152, 219, 0.35);
    border-color: #3498db;
    box-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
  }

  .robots-left {
    display: flex;
    gap: 4px;
  }

  .robots-left .pip {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    transition: all 0.3s;
  }

  .top .pip { background: #e74c3c; }
  .top .pip.lost { background: rgba(231, 76, 60, 0.2); }
  .bottom .pip { background: #3498db; }
  .bottom .pip.lost { background: rgba(52, 152, 219, 0.2); }

  /* --- Board --- */
  .board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(calc(100vw - 16px), calc(100dvh - 160px), 500px);
    height: min(calc(100vw - 16px), calc(100dvh - 160px), 500px);
    border: 3px solid #2a2a4a;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
  }

  .cell {
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    overflow: hidden;
  }

  .cell.light { background: #1a1a3e; }
  .cell.dark { background: #12122a; }

  .cell.selected {
    background: rgba(46, 204, 113, 0.35) !important;
    box-shadow: inset 0 0 12px rgba(46, 204, 113, 0.3);
  }

  .cell.valid-move::after {
    content: '';
    width: 28%;
    height: 28%;
    background: rgba(46, 204, 113, 0.5);
    border-radius: 50%;
    position: absolute;
    pointer-events: none;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .cell.valid-attack {
    background: rgba(231, 76, 60, 0.15) !important;
  }

  .cell.valid-attack::after {
    content: '';
    width: 75%;
    height: 75%;
    background: transparent;
    border: 3px solid rgba(231, 76, 60, 0.5);
    border-radius: 50%;
    position: absolute;
    pointer-events: none;
    animation: pulse 1.2s ease-in-out infinite;
  }

  /* Rotate indicator on selected cell */
  .cell.selected .rotate-hint {
    position: absolute;
    bottom: 2px;
    right: 2px;
    font-size: 0.6em;
    opacity: 0.7;
    color: #2ecc71;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* --- Robot pieces --- */
  .robot {
    width: 82%;
    height: 82%;
    position: relative;
    z-index: 1;
    transition: transform 0.25s ease;
  }

  .robot:active {
    transform: scale(0.92);
  }

  /* Robot body (the main square) */
  .robot-body {
    width: 62%;
    height: 75%;
    position: absolute;
    top: 15%;
    left: 19%;
    border-radius: 4px 4px 3px 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8%;
    gap: 4%;
  }

  .robot.p1 .robot-body {
    background: linear-gradient(170deg, #2980b9, #3498db);
    border: 2px solid #1c6ea0;
    box-shadow: 0 3px 10px rgba(52, 152, 219, 0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .robot.p2 .robot-body {
    background: linear-gradient(170deg, #c0392b, #e74c3c);
    border: 2px solid #a33025;
    box-shadow: 0 3px 10px rgba(231, 76, 60, 0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  /* Eyes */
  .robot-eyes {
    display: flex;
    gap: 20%;
    width: 80%;
    justify-content: center;
  }

  .robot-eye {
    width: 28%;
    aspect-ratio: 1;
    background: rgba(255, 255, 255, 0.92);
    border-radius: 3px;
    box-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
  }

  /* Mouth */
  .robot-mouth {
    width: 40%;
    height: 5%;
    min-height: 2px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 1px;
  }

  /* Belly panel */
  .robot-belly {
    width: 70%;
    height: 28%;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 2px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-items: center;
    padding: 6%;
    margin-top: 2%;
  }

  .robot-screw {
    width: 22%;
    aspect-ratio: 1;
    background: rgba(255, 255, 255, 0.35);
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.15);
  }

  /* Antenna */
  .robot-antenna {
    position: absolute;
    top: 4%;
    left: 50%;
    transform: translateX(-50%);
    width: 6%;
    height: 14%;
    background: #888;
    border-radius: 1px;
  }

  .robot-antenna::after {
    content: '';
    position: absolute;
    top: -55%;
    left: 50%;
    transform: translateX(-50%);
    width: 160%;
    aspect-ratio: 1;
    border-radius: 50%;
  }

  .robot.p1 .robot-antenna::after {
    background: #2ecc71;
    box-shadow: 0 0 6px #2ecc71;
  }

  .robot.p2 .robot-antenna::after {
    background: #f39c12;
    box-shadow: 0 0 6px #f39c12;
  }

  /* Arms */
  .robot-arm {
    position: absolute;
    width: 14%;
    height: 40%;
    top: 30%;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 3px;
  }

  .robot-arm.left {
    left: 2%;
    transform: rotate(8deg);
  }

  .robot-arm.right {
    right: 2%;
    transform: rotate(-8deg);
  }

  .robot.p1 .robot-arm {
    background: #2578a8;
    border: 1px solid #1c6ea0;
  }

  .robot.p2 .robot-arm {
    background: #a83529;
    border: 1px solid #a33025;
  }

  /* Arm "hands" */
  .robot-arm::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 10%;
    width: 80%;
    height: 22%;
    background: #666;
    border-radius: 2px;
  }

  /* --- Overlay / Win screen --- */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 100;
    gap: 20px;
    backdrop-filter: blur(4px);
  }

  .overlay.show { display: flex; }

  .overlay h1 {
    font-size: 2em;
    text-align: center;
    line-height: 1.4;
  }

  .overlay .winner-robot-display {
    width: 100px;
    height: 100px;
    position: relative;
    margin-bottom: 10px;
  }

  .overlay .winner-robot-display .robot-body {
    border-radius: 8px;
  }

  .overlay .winner-robot-display .robot-eye {
    border-radius: 4px;
  }

  .btn {
    padding: 14px 36px;
    font-size: 1.1em;
    font-weight: 700;
    background: linear-gradient(145deg, #27ae60, #2ecc71);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
    letter-spacing: 0.5px;
  }

  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }

  /* --- Intro screen --- */
  .intro-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 200;
    transition: opacity 0.6s ease;
  }

  .intro-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .intro-title {
    font-size: clamp(2.5em, 10vw, 5em);
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    position: relative;
    animation: introGlitch 3s ease-in-out infinite;
    text-shadow:
      0 0 10px rgba(52, 152, 219, 0.8),
      0 0 40px rgba(52, 152, 219, 0.4),
      0 0 80px rgba(52, 152, 219, 0.2);
  }

  .intro-title::before,
  .intro-title::after {
    content: 'ROBOTSPELET';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .intro-title::before {
    color: #e74c3c;
    animation: glitchLeft 2.5s ease-in-out infinite;
    clip-path: inset(0 0 60% 0);
  }

  .intro-title::after {
    color: #3498db;
    animation: glitchRight 2.5s ease-in-out infinite;
    clip-path: inset(60% 0 0 0);
  }

  @keyframes glitchLeft {
    0%, 90%, 100% { transform: translate(0); }
    92% { transform: translate(-4px, -2px); }
    94% { transform: translate(3px, 1px); }
    96% { transform: translate(-2px, 1px); }
  }

  @keyframes glitchRight {
    0%, 90%, 100% { transform: translate(0); }
    91% { transform: translate(3px, 2px); }
    93% { transform: translate(-3px, -1px); }
    95% { transform: translate(2px, -1px); }
  }

  @keyframes introGlitch {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.98; }
    51% { opacity: 0.9; }
    52% { opacity: 1; }
  }

  .intro-byline {
    font-size: clamp(0.9em, 3vw, 1.3em);
    color: rgba(255, 255, 255, 0.6);
    margin-top: 20px;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.8s forwards;
  }

  .intro-robot {
    width: 80px;
    height: 80px;
    position: relative;
    margin-top: 40px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.4s forwards, introFloat 3s ease-in-out 1.4s infinite;
  }

  .intro-start {
    margin-top: 50px;
    font-size: 1em;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeInUp 1s ease 1.4s forwards, blink 2s ease-in-out 2.4s infinite;
    cursor: pointer;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes introFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Scanlines effect */
  .intro-scanlines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.1) 2px,
      rgba(0, 0, 0, 0.1) 4px
    );
    pointer-events: none;
  }

  /* Particles */
  .intro-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    animation: particleDrift linear infinite;
    opacity: 0;
  }

  @keyframes particleDrift {
    0% { opacity: 0; transform: translateY(0); }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-100vh); }
  }

  /* --- Fly (Fluga) --- */
  .fly-body {
    width: 50%;
    height: 55%;
    position: absolute;
    top: 30%;
    left: 25%;
    border-radius: 50% 50% 45% 45%;
    background: #2a2a2a;
    border: 1.5px solid #444;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }

  .fly-head {
    width: 32%;
    height: 26%;
    position: absolute;
    top: 12%;
    left: 34%;
    border-radius: 50%;
    background: #333;
    border: 1.5px solid #444;
    z-index: 2;
  }

  .fly-eye {
    width: 42%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e44, #900);
    position: absolute;
    top: 20%;
    box-shadow: 0 0 4px rgba(255,50,50,0.5);
  }

  .fly-eye.left { left: -8%; }
  .fly-eye.right { right: -8%; }

  .fly-wing {
    position: absolute;
    width: 42%;
    height: 55%;
    top: 18%;
    background: rgba(200, 220, 255, 0.25);
    border: 1.5px solid rgba(200, 220, 255, 0.35);
    border-radius: 50% 50% 40% 40%;
    z-index: 0;
    transform-origin: 50% 90%;
    transition: transform 0.1s;
  }

  .fly-wing.left {
    left: 2%;
    transform: rotate(25deg);
  }

  .fly-wing.right {
    right: 2%;
    transform: rotate(-25deg);
  }

  /* Wing flapping animation */
  .robot.moving .fly-wing.left,
  .robot.fly-walking .fly-wing.left {
    animation: flapLeft 0.08s ease-in-out 6;
  }

  .robot.moving .fly-wing.right,
  .robot.fly-walking .fly-wing.right {
    animation: flapRight 0.08s ease-in-out 6;
  }

  @keyframes flapLeft {
    0%, 100% { transform: rotate(25deg) scaleY(1); }
    50% { transform: rotate(55deg) scaleY(0.7); }
  }

  @keyframes flapRight {
    0%, 100% { transform: rotate(-25deg) scaleY(1); }
    50% { transform: rotate(-55deg) scaleY(0.7); }
  }

  .fly-leg {
    position: absolute;
    width: 8%;
    height: 20%;
    background: #333;
    border-radius: 1px;
    z-index: 1;
  }

  .fly-leg.fl { top: 42%; left: 10%; transform: rotate(25deg); }
  .fly-leg.fr { top: 42%; right: 10%; transform: rotate(-25deg); }
  .fly-leg.bl { top: 62%; left: 8%; transform: rotate(15deg); }
  .fly-leg.br { top: 62%; right: 8%; transform: rotate(-15deg); }

  /* Player marker on fly */
  .fly-marker {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 22%;
    height: 8%;
    border-radius: 2px;
    z-index: 3;
  }

  .robot.p1 .fly-marker { background: #3498db; box-shadow: 0 0 4px rgba(52,152,219,0.6); }
  .robot.p2 .fly-marker { background: #e74c3c; box-shadow: 0 0 4px rgba(231,76,60,0.6); }

  /* --- Ladybug (Nyckelpiga) --- */
  .ladybug-dome {
    width: 60%;
    height: 65%;
    position: absolute;
    top: 22%;
    left: 20%;
    border-radius: 50% 50% 45% 45%;
    background: radial-gradient(ellipse at 40% 35%, #e53935, #c62828);
    border: 1.5px solid #a11;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    overflow: hidden;
  }

  /* Center line on dome */
  .ladybug-dome::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    background: rgba(0,0,0,0.35);
    transform: translateX(-50%);
  }

  .ladybug-spot {
    position: absolute;
    border-radius: 50%;
    background: #1a1a1a;
  }

  .ladybug-spot.s1 { width: 22%; height: 18%; top: 20%; left: 12%; }
  .ladybug-spot.s2 { width: 22%; height: 18%; top: 20%; right: 12%; }
  .ladybug-spot.s3 { width: 18%; height: 15%; top: 50%; left: 18%; }
  .ladybug-spot.s4 { width: 18%; height: 15%; top: 50%; right: 18%; }
  .ladybug-spot.s5 { width: 16%; height: 13%; top: 72%; left: 30%; }
  .ladybug-spot.s6 { width: 16%; height: 13%; top: 72%; right: 30%; }

  .ladybug-head {
    width: 28%;
    height: 22%;
    position: absolute;
    top: 8%;
    left: 36%;
    border-radius: 50%;
    background: #1a1a1a;
    z-index: 2;
  }

  .ladybug-eye {
    width: 32%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #fff;
    position: absolute;
    top: 25%;
    box-shadow: 0 0 3px rgba(255,255,255,0.5);
  }

  .ladybug-eye.left { left: 5%; }
  .ladybug-eye.right { right: 5%; }

  .ladybug-antenna {
    position: absolute;
    width: 5%;
    height: 14%;
    background: #1a1a1a;
    border-radius: 1px;
    z-index: 3;
  }

  .ladybug-antenna.left {
    top: 2%;
    left: 38%;
    transform: rotate(-15deg);
  }

  .ladybug-antenna.right {
    top: 2%;
    right: 38%;
    transform: rotate(15deg);
  }

  .ladybug-antenna::after {
    content: '';
    position: absolute;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 140%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #1a1a1a;
  }

  .ladybug-leg {
    position: absolute;
    width: 7%;
    height: 16%;
    background: #1a1a1a;
    border-radius: 1px;
    z-index: 1;
  }

  .ladybug-leg.fl { top: 36%; left: 8%; transform: rotate(30deg); }
  .ladybug-leg.fr { top: 36%; right: 8%; transform: rotate(-30deg); }
  .ladybug-leg.ml { top: 52%; left: 6%; transform: rotate(15deg); }
  .ladybug-leg.mr { top: 52%; right: 6%; transform: rotate(-15deg); }
  .ladybug-leg.bl { top: 68%; left: 8%; transform: rotate(5deg); }
  .ladybug-leg.br { top: 68%; right: 8%; transform: rotate(-5deg); }

  /* Player marker on ladybug */
  .ladybug-marker {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 20%;
    height: 6%;
    border-radius: 2px;
    z-index: 3;
  }

  .robot.p1 .ladybug-marker { background: #3498db; box-shadow: 0 0 4px rgba(52,152,219,0.6); }
  .robot.p2 .ladybug-marker { background: #e74c3c; box-shadow: 0 0 4px rgba(231,76,60,0.6); }

  /* --- Character select screen --- */
  .character-select {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    z-index: 150;
    transition: opacity 0.6s ease;
  }

  .character-select.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .char-select-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
  }

  .char-select-panel.top-panel {
    transform: rotate(180deg);
    border-bottom: 2px solid rgba(231, 76, 60, 0.3);
  }

  .char-select-panel.bottom-panel {
    border-top: 2px solid rgba(52, 152, 219, 0.3);
  }

  .char-select-title {
    font-size: clamp(1em, 4vw, 1.4em);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .top-panel .char-select-title { color: #e74c3c; }
  .bottom-panel .char-select-title { color: #3498db; }

  .char-options {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .char-option {
    width: 80px;
    height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: all 0.2s;
    padding: 6px;
  }

  .char-option:hover {
    background: rgba(255,255,255,0.1);
  }

  .char-option.selected-char {
    border-color: #2ecc71;
    background: rgba(46, 204, 113, 0.15);
    box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
  }

  .char-option .char-preview {
    width: 50px;
    height: 50px;
    position: relative;
  }

  .char-option .char-label {
    font-size: 0.75em;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .char-select-ready {
    margin-top: 8px;
    font-size: 0.85em;
    font-weight: 600;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .char-select-ready.visible { opacity: 1; }

  .top-panel .char-select-ready { color: #e74c3c; }
  .bottom-panel .char-select-ready { color: #3498db; }

  .char-select-start {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    padding: 12px 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .char-select-start.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* Move animation */
  .robot.moving {
    animation: moveRobot 0.2s ease-out;
  }

  @keyframes moveRobot {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* Explosion effect */
  .explosion {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    z-index: 10;
    pointer-events: none;
  }

  .explosion-particle {
    position: absolute;
    border-radius: 50%;
    animation: explode 0.5s ease-out forwards;
  }

  @keyframes explode {
    0% {
      transform: translate(0, 0) scale(1);
      opacity: 1;
    }
    100% {
      transform: translate(var(--tx), var(--ty)) scale(0);
      opacity: 0;
    }
  }

  .explosion-flash {
    position: absolute;
    width: 80%;
    height: 80%;
    top: 10%; left: 10%;
    background: radial-gradient(circle, rgba(255,200,50,0.9), rgba(255,100,20,0.6), transparent 70%);
    border-radius: 50%;
    animation: flash 0.4s ease-out forwards;
    z-index: 10;
    pointer-events: none;
  }

  @keyframes flash {
    0% { transform: scale(0.3); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.8; }
    100% { transform: scale(1.5); opacity: 0; }
  }
</style>
</head>
<body>

<div class="intro-screen" id="intro-screen">
  <div class="intro-scanlines"></div>
  <div class="intro-title">ROBOTSPELET</div>
  <div class="intro-byline">gjort av Joar</div>
  <div class="intro-robot" id="intro-robot"></div>
  <div class="intro-start">TRYCK FÖR ATT STARTA</div>
</div>

<div class="character-select" id="character-select">
  <div class="char-select-panel top-panel" id="char-panel-2">
    <div class="char-select-title">SPELARE 2 — VÄLJ FIGUR</div>
    <div class="char-options" id="char-options-2"></div>
    <div class="char-select-ready" id="char-ready-2">REDO!</div>
  </div>
  <button class="btn char-select-start" id="char-start-btn">SPELA!</button>
  <div class="char-select-panel bottom-panel" id="char-panel-1">
    <div class="char-select-title">SPELARE 1 — VÄLJ FIGUR</div>
    <div class="char-options" id="char-options-1"></div>
    <div class="char-select-ready" id="char-ready-1">REDO!</div>
  </div>
</div>

<div class="game-container">
  <div class="player-info top" id="player2-info">
    <span class="status" id="p2-status">Väntar...</span>
    <span>&#x1f534; Spelare 2</span>
    <div class="robots-left" id="p2-pips"></div>
  </div>

  <div class="board" id="board"></div>

  <div class="player-info bottom" id="player1-info">
    <div class="robots-left" id="p1-pips"></div>
    <span>&#x1f535; Spelare 1</span>
    <span class="status" id="p1-status">Din tur!</span>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="winner-robot-display" id="winner-robot-display"></div>
  <h1 id="win-text"></h1>
  <button class="btn" onclick="restartGame()">Spela igen</button>
</div>

<script>
const ROWS = 8;
const COLS = 8;
const ROBOTS_PER_PLAYER = 5;
const START_COLS = [1, 2, 3, 4, 5];

// Direction vectors: [rowDelta, colDelta]
const DIR_VECTORS = {
  up:    [-1,  0],
  down:  [ 1,  0],
  left:  [ 0, -1],
  right: [ 0,  1]
};

// CSS rotation for each direction (robot "face" points this way)
const DIR_ROTATION = {
  up: 0,
  right: 90,
  down: 180,
  left: 270
};

// Clockwise turn order
const CLOCKWISE = ['up', 'right', 'down', 'left'];

// Sideways directions for each facing
function getSidewaysDirs(facing) {
  if (facing === 'up' || facing === 'down') return ['left', 'right'];
  return ['up', 'down'];
}

// Character types
const CHAR_TYPES = ['robot', 'fly', 'ladybug'];
const CHAR_LABELS = { robot: 'Robot', fly: 'Fluga', ladybug: 'Nyckelpiga' };
let playerCharacter = { 1: 'robot', 2: 'robot' };

// grid[row][col] = null | { player: 1|2, dir: 'up'|'down'|'left'|'right' }
let grid = [];
let currentPlayer = 1;
let selectedCell = null;
let gameOver = false;
let robotCounts = { 1: ROBOTS_PER_PLAYER, 2: ROBOTS_PER_PLAYER };

const boardEl = document.getElementById('board');

function initGame() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  currentPlayer = 1;
  selectedCell = null;
  gameOver = false;
  robotCounts = { 1: ROBOTS_PER_PLAYER, 2: ROBOTS_PER_PLAYER };

  for (const col of START_COLS) {
    grid[0][col] = { player: 2, dir: 'down' };
    grid[7][col] = { player: 1, dir: 'up' };
  }

  document.getElementById('overlay').classList.remove('show');
  renderBoard();
  updateUI();
}

function renderBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      const isLight = (r + c) % 2 === 0;
      cell.className = `cell ${isLight ? 'light' : 'dark'}`;

      if (selectedCell && selectedCell.row === r && selectedCell.col === c) {
        cell.classList.add('selected');
        // Rotate hint
        const hint = document.createElement('div');
        hint.className = 'rotate-hint';
        hint.textContent = '↻';
        cell.appendChild(hint);
      }

      if (selectedCell) {
        const moveType = getMoveType(selectedCell.row, selectedCell.col, r, c);
        if (moveType === 'move') cell.classList.add('valid-move');
        if (moveType === 'attack') cell.classList.add('valid-attack');
      }

      if (grid[r][c] !== null) {
        const robot = createRobotElement(grid[r][c].player, grid[r][c].dir);
        cell.appendChild(robot);
      }

      cell.addEventListener('click', () => onCellClick(r, c));
      boardEl.appendChild(cell);
    }
  }
}

function createRobotElement(player, dir, charType) {
  charType = charType || playerCharacter[player] || 'robot';
  const robot = document.createElement('div');
  robot.className = `robot p${player}`;
  robot.style.transform = `rotate(${DIR_ROTATION[dir]}deg)`;

  if (charType === 'fly') {
    return createFlyElement(robot);
  } else if (charType === 'ladybug') {
    return createLadybugElement(robot);
  }

  // Default: Robot
  // Antenna
  const antenna = document.createElement('div');
  antenna.className = 'robot-antenna';
  robot.appendChild(antenna);

  // Arms
  const armL = document.createElement('div');
  armL.className = 'robot-arm left';
  robot.appendChild(armL);

  const armR = document.createElement('div');
  armR.className = 'robot-arm right';
  robot.appendChild(armR);

  // Body
  const body = document.createElement('div');
  body.className = 'robot-body';

  const eyes = document.createElement('div');
  eyes.className = 'robot-eyes';
  eyes.innerHTML = '<div class="robot-eye"></div><div class="robot-eye"></div>';

  const mouth = document.createElement('div');
  mouth.className = 'robot-mouth';

  const belly = document.createElement('div');
  belly.className = 'robot-belly';
  belly.innerHTML = '<div class="robot-screw"></div><div class="robot-screw"></div><div class="robot-screw"></div><div class="robot-screw"></div>';

  body.appendChild(eyes);
  body.appendChild(mouth);
  body.appendChild(belly);
  robot.appendChild(body);

  return robot;
}

function createFlyElement(robot) {
  // Wings
  const wingL = document.createElement('div');
  wingL.className = 'fly-wing left';
  robot.appendChild(wingL);

  const wingR = document.createElement('div');
  wingR.className = 'fly-wing right';
  robot.appendChild(wingR);

  // Head
  const head = document.createElement('div');
  head.className = 'fly-head';
  const eyeL = document.createElement('div');
  eyeL.className = 'fly-eye left';
  const eyeR = document.createElement('div');
  eyeR.className = 'fly-eye right';
  head.appendChild(eyeL);
  head.appendChild(eyeR);
  robot.appendChild(head);

  // Body
  const body = document.createElement('div');
  body.className = 'fly-body';
  robot.appendChild(body);

  // Legs
  ['fl','fr','bl','br'].forEach(cls => {
    const leg = document.createElement('div');
    leg.className = 'fly-leg ' + cls;
    robot.appendChild(leg);
  });

  // Player marker
  const marker = document.createElement('div');
  marker.className = 'fly-marker';
  robot.appendChild(marker);

  return robot;
}

function createLadybugElement(robot) {
  // Antennae
  const antL = document.createElement('div');
  antL.className = 'ladybug-antenna left';
  robot.appendChild(antL);
  const antR = document.createElement('div');
  antR.className = 'ladybug-antenna right';
  robot.appendChild(antR);

  // Head
  const head = document.createElement('div');
  head.className = 'ladybug-head';
  const eyeL = document.createElement('div');
  eyeL.className = 'ladybug-eye left';
  const eyeR = document.createElement('div');
  eyeR.className = 'ladybug-eye right';
  head.appendChild(eyeL);
  head.appendChild(eyeR);
  robot.appendChild(head);

  // Dome with spots
  const dome = document.createElement('div');
  dome.className = 'ladybug-dome';
  ['s1','s2','s3','s4','s5','s6'].forEach(cls => {
    const spot = document.createElement('div');
    spot.className = 'ladybug-spot ' + cls;
    dome.appendChild(spot);
  });
  robot.appendChild(dome);

  // Legs
  ['fl','fr','ml','mr','bl','br'].forEach(cls => {
    const leg = document.createElement('div');
    leg.className = 'ladybug-leg ' + cls;
    robot.appendChild(leg);
  });

  // Player marker
  const marker = document.createElement('div');
  marker.className = 'ladybug-marker';
  robot.appendChild(marker);

  return robot;
}

function wrapCoord(r, c) {
  return { row: ((r % ROWS) + ROWS) % ROWS, col: ((c % COLS) + COLS) % COLS };
}

function getValidMoves(row, col) {
  const piece = grid[row][col];
  if (!piece) return [];

  const moves = [];
  const fwd = DIR_VECTORS[piece.dir];
  const sides = getSidewaysDirs(piece.dir);

  // Forward (wraps around the board)
  const fw = wrapCoord(row + fwd[0], col + fwd[1]);
  const fTarget = grid[fw.row][fw.col];
  if (!fTarget || fTarget.player !== piece.player) {
    moves.push(fw);
  }

  // Sideways (no wrap — edges block sideways)
  for (const side of sides) {
    const sv = DIR_VECTORS[side];
    const sr = row + sv[0];
    const sc = col + sv[1];
    if (sr >= 0 && sr < ROWS && sc >= 0 && sc < COLS) {
      const target = grid[sr][sc];
      if (!target || target.player !== piece.player) {
        moves.push({ row: sr, col: sc });
      }
    }
  }

  return moves;
}

function getMoveType(fromRow, fromCol, toRow, toCol) {
  const moves = getValidMoves(fromRow, fromCol);
  const match = moves.find(m => m.row === toRow && m.col === toCol);
  if (!match) return null;

  const target = grid[toRow][toCol];
  if (target && target.player !== grid[fromRow][fromCol].player) return 'attack';
  if (!target) return 'move';
  return null;
}

function onCellClick(row, col) {
  if (gameOver) return;

  if (selectedCell) {
    // Clicked the same robot again → rotate clockwise
    if (selectedCell.row === row && selectedCell.col === col) {
      rotateRobot(row, col);
      return;
    }

    const moveType = getMoveType(selectedCell.row, selectedCell.col, row, col);
    if (moveType) {
      executeMove(selectedCell.row, selectedCell.col, row, col, moveType);
      return;
    }

    // Clicked another own robot → reselect
    if (grid[row][col] && grid[row][col].player === currentPlayer) {
      selectedCell = { row, col };
      renderBoard();
      return;
    }

    // Clicked elsewhere → deselect
    selectedCell = null;
    renderBoard();
    return;
  }

  // No selection — select own robot
  if (grid[row][col] && grid[row][col].player === currentPlayer) {
    selectedCell = { row, col };
    renderBoard();
  }
}

function rotateRobot(row, col) {
  const piece = grid[row][col];
  const idx = CLOCKWISE.indexOf(piece.dir);
  piece.dir = CLOCKWISE[(idx + 1) % 4];

  selectedCell = null;
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  renderBoard();
  updateUI();
}

function spawnExplosion(cellEl) {
  const colors = ['#ff4', '#f72', '#f44', '#fa0', '#fff'];
  const particleCount = 10;

  // Flash
  const flash = document.createElement('div');
  flash.className = 'explosion-flash';
  cellEl.appendChild(flash);

  // Particles
  for (let i = 0; i < particleCount; i++) {
    const p = document.createElement('div');
    p.className = 'explosion-particle';
    const angle = (Math.PI * 2 * i) / particleCount;
    const dist = 20 + Math.random() * 25;
    const size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.top = '50%';
    p.style.left = '50%';
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.animationDuration = (0.3 + Math.random() * 0.3) + 's';
    cellEl.appendChild(p);
  }

  setTimeout(() => {
    flash.remove();
    cellEl.querySelectorAll('.explosion-particle').forEach(p => p.remove());
  }, 600);
}

function executeMove(fromRow, fromCol, toRow, toCol, moveType) {
  const piece = grid[fromRow][fromCol];
  const opponent = piece.player === 1 ? 2 : 1;

  if (moveType === 'attack') {
    robotCounts[opponent]--;
  }

  grid[toRow][toCol] = piece;
  grid[fromRow][fromCol] = null;
  selectedCell = null;

  if (robotCounts[opponent] === 0) {
    gameOver = true;
    renderBoard();
    updateUI();

    // Explosion on the capture cell before showing win
    if (moveType === 'attack') {
      const cellEl = boardEl.children[toRow * COLS + toCol];
      spawnExplosion(cellEl);
    }

    showWin(piece.player);
    return;
  }

  currentPlayer = opponent;
  renderBoard();
  updateUI();

  const cellIndex = toRow * COLS + toCol;
  const cellEl = boardEl.children[cellIndex];

  // Explosion on attack
  if (moveType === 'attack') {
    spawnExplosion(cellEl);
  }

  // Animate
  const robotEl = cellEl.querySelector('.robot');
  if (robotEl) {
    robotEl.classList.add('moving');
    // Extra wing flap for flies
    const movedPlayer = grid[toRow][toCol] ? grid[toRow][toCol].player : null;
    if (movedPlayer && playerCharacter[movedPlayer] === 'fly') {
      robotEl.classList.add('fly-walking');
      setTimeout(() => robotEl.classList.remove('fly-walking'), 500);
    }
    setTimeout(() => robotEl.classList.remove('moving'), 200);
  }
}

function updateUI() {
  const p1Info = document.getElementById('player1-info');
  const p2Info = document.getElementById('player2-info');
  const p1Status = document.getElementById('p1-status');
  const p2Status = document.getElementById('p2-status');

  p1Info.classList.toggle('active', currentPlayer === 1);
  p2Info.classList.toggle('active', currentPlayer === 2);

  p1Status.textContent = currentPlayer === 1 ? 'Din tur!' : 'Väntar...';
  p2Status.textContent = currentPlayer === 2 ? 'Din tur!' : 'Väntar...';

  updatePips('p1-pips', 1);
  updatePips('p2-pips', 2);
}

function updatePips(containerId, player) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  for (let i = 0; i < ROBOTS_PER_PLAYER; i++) {
    const pip = document.createElement('div');
    pip.className = `pip${i >= robotCounts[player] ? ' lost' : ''}`;
    container.appendChild(pip);
  }
}

function showWin(player) {
  const overlay = document.getElementById('overlay');
  const winText = document.getElementById('win-text');
  const display = document.getElementById('winner-robot-display');

  display.innerHTML = '';
  const robot = createRobotElement(player, 'up', playerCharacter[player]);
  robot.style.width = '100%';
  robot.style.height = '100%';
  robot.style.transform = 'rotate(0deg)';
  display.appendChild(robot);

  winText.innerHTML = `Spelare ${player} vinner!`;
  setTimeout(() => overlay.classList.add('show'), 400);
}

// --- Intro screen ---
function setupIntro() {
  const introScreen = document.getElementById('intro-screen');
  const introRobot = document.getElementById('intro-robot');

  // Create a robot for the intro
  const robot = createRobotElement(1, 'up');
  robot.style.width = '100%';
  robot.style.height = '100%';
  robot.style.transform = 'rotate(0deg)';
  introRobot.appendChild(robot);

  // Spawn floating particles
  const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f39c12'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'intro-particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-10px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 5) + 's';
    p.style.width = (2 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    introScreen.appendChild(p);
  }

  // Start game on click/tap
  introScreen.addEventListener('click', startGame);
  introScreen.addEventListener('keydown', startGame);

  function startGame() {
    introScreen.removeEventListener('click', startGame);
    introScreen.removeEventListener('keydown', startGame);
    introScreen.classList.add('hidden');
    setTimeout(() => introScreen.remove(), 700);
    setupCharacterSelect();
  }
}

function restartGame() {
  document.getElementById('overlay').classList.remove('show');
  // Recreate character select screen
  const cs = document.createElement('div');
  cs.className = 'character-select';
  cs.id = 'character-select';
  cs.innerHTML = `
    <div class="char-select-panel top-panel" id="char-panel-2">
      <div class="char-select-title">SPELARE 2 — VÄLJ FIGUR</div>
      <div class="char-options" id="char-options-2"></div>
      <div class="char-select-ready" id="char-ready-2">REDO!</div>
    </div>
    <button class="btn char-select-start" id="char-start-btn">SPELA!</button>
    <div class="char-select-panel bottom-panel" id="char-panel-1">
      <div class="char-select-title">SPELARE 1 — VÄLJ FIGUR</div>
      <div class="char-options" id="char-options-1"></div>
      <div class="char-select-ready" id="char-ready-1">REDO!</div>
    </div>
  `;
  document.body.appendChild(cs);
  setupCharacterSelect();
}

// --- Character select ---
function setupCharacterSelect() {
  const screen = document.getElementById('character-select');
  const startBtn = document.getElementById('char-start-btn');
  const selections = { 1: 'robot', 2: 'robot' };

  [1, 2].forEach(p => {
    const container = document.getElementById('char-options-' + p);
    container.innerHTML = '';
    CHAR_TYPES.forEach(type => {
      const option = document.createElement('div');
      option.className = 'char-option' + (type === 'robot' ? ' selected-char' : '');
      option.dataset.type = type;

      const preview = document.createElement('div');
      preview.className = 'char-preview';
      const fig = createRobotElement(p, 'up', type);
      fig.style.width = '100%';
      fig.style.height = '100%';
      fig.style.transform = 'rotate(0deg)';
      preview.appendChild(fig);

      const label = document.createElement('div');
      label.className = 'char-label';
      label.textContent = CHAR_LABELS[type];

      option.appendChild(preview);
      option.appendChild(label);

      option.addEventListener('click', () => {
        selections[p] = type;
        container.querySelectorAll('.char-option').forEach(o => o.classList.remove('selected-char'));
        option.classList.add('selected-char');
        document.getElementById('char-ready-' + p).classList.add('visible');
        checkReady();
      });

      container.appendChild(option);
    });
    // Mark default as ready
    document.getElementById('char-ready-' + p).classList.add('visible');
  });

  function checkReady() {
    startBtn.classList.toggle('visible', true);
  }
  checkReady();

  startBtn.addEventListener('click', () => {
    playerCharacter[1] = selections[1];
    playerCharacter[2] = selections[2];
    screen.classList.add('hidden');
    setTimeout(() => screen.remove(), 700);
    initGame();
  });
}

setupIntro();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
