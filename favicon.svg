<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#2a2a4a" stroke-width="6"/>
  <!-- Grid lines (subtle) -->
  <g stroke="#1a1a3e" stroke-width="1.5" opacity="0.5">
    <line x1="128" y1="80" x2="128" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="384" y1="80" x2="384" y2="432"/>
    <line x1="80" y1="176" x2="432" y2="176"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="336" x2="432" y2="336"/>
  </g>
  <!-- Blue robot (bottom-left) -->
  <g transform="translate(148, 270)">
    <!-- Antenna -->
    <line x1="54" y1="0" x2="54" y2="-18" stroke="#3498db" stroke-width="5" stroke-linecap="round"/>
    <circle cx="54" cy="-22" r="7" fill="#3498db"/>
    <!-- Body -->
    <rect x="16" y="8" width="76" height="95" rx="8" fill="url(#blue)" stroke="#1c6ea0" stroke-width="3"/>
    <!-- Eyes -->
    <ellipse cx="38" cy="36" rx="10" ry="11" fill="rgba(255,255,255,0.92)"/>
    <ellipse cx="70" cy="36" rx="10" ry="11" fill="rgba(255,255,255,0.92)"/>
    <circle cx="40" cy="37" r="5" fill="#1a1a3e"/>
    <circle cx="72" cy="37" r="5" fill="#1a1a3e"/>
    <!-- Mouth -->
    <rect x="30" y="60" width="48" height="6" rx="3" fill="rgba(0,0,0,0.3)"/>
    <!-- Direction arrow -->
    <polygon points="54,110 40,130 68,130" fill="#3498db" opacity="0.7"/>
  </g>
  <!-- Red robot (top-right) -->
  <g transform="translate(272, 100)">
    <!-- Antenna -->
    <line x1="54" y1="0" x2="54" y2="-18" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
    <circle cx="54" cy="-22" r="7" fill="#e74c3c"/>
    <!-- Body -->
    <rect x="16" y="8" width="76" height="95" rx="8" fill="url(#red)" stroke="#a33025" stroke-width="3"/>
    <!-- Eyes -->
    <ellipse cx="38" cy="36" rx="10" ry="11" fill="rgba(255,255,255,0.92)"/>
    <ellipse cx="70" cy="36" rx="10" ry="11" fill="rgba(255,255,255,0.92)"/>
    <circle cx="40" cy="37" r="5" fill="#1a1a3e"/>
    <circle cx="72" cy="37" r="5" fill="#1a1a3e"/>
    <!-- Mouth -->
    <rect x="30" y="60" width="48" height="6" rx="3" fill="rgba(0,0,0,0.3)"/>
    <!-- Direction arrow (pointing up) -->
    <polygon points="54,-30 40,-10 68,-10" fill="#e74c3c" opacity="0" />
  </g>
  <!-- Decorative glow -->
  <circle cx="180" cy="400" r="60" fill="#3498db" opacity="0.06"/>
  <circle cx="340" cy="120" r="50" fill="#e74c3c" opacity="0.06"/>
</svg>
